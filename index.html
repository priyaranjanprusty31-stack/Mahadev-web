<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahadev Blessings</title>

<meta name="description" content="Check how much Mahadev loves you. Get your blessing percentage and share with friends. Har Har Mahadev!">
<meta name="keywords" content="Mahadev love calculator, Shiva blessing, Har Har Mahadev, spiritual blessing checker">
<meta name="author" content="Mahadev Blessings">
<meta property="og:title" content="Mahadev Blessings - Check Your Divine Love %">
<meta property="og:description" content="See how much Mahadev loves you and share your blessing!">
<meta property="og:type" content="website">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(to right,#000428,#004e92);
    color:white;
}

.top-popup{
    background:#ff9800;
    padding:10px;
    font-weight:bold;
}

.container{
    margin-top:60px;
}

input{
    padding:10px;
    width:250px;
    border-radius:8px;
    border:none;
    margin:10px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ff5722;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* WhatsApp Button Style */
.wa-btn{
    background:#25D366;
    margin-top:15px;
    display:none; /* Sirf result ke baad dikhega */
}

.result-box{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
    box-shadow: 0 0 25px rgba(255,215,0,0.5);
    padding:15px;
    border-radius:12px;
}

.visitor{
    margin-top:40px;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="top-popup">🔱 Share this divine blessing with your loved ones 🙏</div>

<div class="container">
    <h1>🔱 Mahadev Blessings 🔱</h1>

    <input type="text" id="name" placeholder="Enter Your Name">
    <br>
    <button onclick="calculateLove()">Check Blessing %</button>

    <div class="result-box" id="result">
        <span id="finalPercent">0%</span>
    </div>

    <button id="waShare" class="wa-btn" onclick="shareWhatsApp()">🚩 Share on WhatsApp</button>

    <div class="visitor">
        Visitors: <span id="count">1008</span>
    </div>
</div>

<script>

// Auto Visitor Counter
let base = 1008;
setInterval(()=>{
    base += Math.floor(Math.random()*3);
    document.getElementById("count").innerText = base.toLocaleString();
},3000);

function calculateLove(){
    let name = document.getElementById("name").value;
    if(name.trim()==""){
        alert("Please enter your name");
        return;
    }

    let loveNum = Math.floor(Math.random()*6)+95;

    let count = 0;
    let interval = setInterval(()=>{
        count++;
        document.getElementById("finalPercent").innerText = count + "%";
        if(count >= loveNum){
            clearInterval(interval);
            // Result ke baad WhatsApp button dikhayein
            document.getElementById("waShare").style.display = "inline-block";
        }
    },25);
}

// Updated Share Function with Name
function shareWhatsApp(){
    let name = document.getElementById("name").value;
    let percent = document.getElementById("finalPercent").innerText;
    let text = "🔱 *" + name + "* ne check kiya ki Mahadev unhe *" + percent + "* pyaar karte hain! 🙏 Aap bhi check karein:";
    let url = window.location.href;
    window.open("https://wa.me/?text=" + encodeURIComponent(text + " " + url));
}

</script>

</body>
                                                          </html>
