<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahadev Blessings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white; overflow-x: hidden;
            background-color: #000;
        }

        /* LOCAL BACKGROUND IMAGE */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* This looks for the file 'mahadev.jpg' in your folder */
            background-image: url('mahadev.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            filter: blur(10px); 
            z-index: -2;
            transform: scale(1.1);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        /* SPIRITUAL ICONS */
        .spiritual-icon {
            position: absolute;
            color: rgba(255, 204, 0, 0.3);
            font-size: 2.5rem;
            z-index: -1;
            animation: float 12s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* POP-UPS */
        .top-popup {
            position: fixed;
            top: 0; width: 100%;
            background: #25D366; color: white;
            padding: 12px; text-align: center;
            font-weight: bold; z-index: 1000;
        }
        .bottom-popup {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); color: #ffd700;
            padding: 12px; text-align: center;
            z-index: 1000; border-top: 2px solid #ffd700;
        }

        /* VISITOR COUNTER */
        .visitor-counter {
            position: fixed;
            right: 15px; bottom: 65px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 15px; border-radius: 20px;
            font-size: 11px; z-index: 999;
            border: 1px solid #ffd700;
        }

        .main {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; padding: 60px 20px;
        }

        h1 { font-size: 2.8rem; margin-bottom: 20px; text-shadow: 0 0 15px #ffaa00; }

        #captureArea {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px 20px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%; max-width: 400px; margin-bottom: 20px;
        }

        input {
            width: 100%; padding: 15px; border-radius: 50px; border: none;
            margin: 20px 0; text-align: center; font-size: 1.1rem;
        }

        .btn-main {
            background: linear-gradient(to right, #ff8c00, #ff4500);
            color: white; border: none; padding: 15px 45px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
        }

        .result-box { display: none; margin-top: 10px; animation: zoomIn 0.5s ease; }
        .percentage { font-size: 4.5rem; color: #ffd700; font-weight: 900; display: block; }

        .share-row { margin-top: 20px; }
        .btn-s {
            text-decoration: none; color: white; padding: 12px 25px;
            border-radius: 50px; margin: 5px; font-weight: bold;
            display: inline-block; font-size: 0.9rem;
        }
        .wa { background: #25D366; }
        .fb { background: #1877F2; }
        .dl { background: #fff; color: #000; border: none; }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.7); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="overlay"></div>

    <div class="spiritual-icon" style="left: 10%; animation-delay: 0s;">🔱</div>
    <div class="spiritual-icon" style="left: 50%; animation-delay: 4s;">🕉️</div>
    <div class="spiritual-icon" style="left: 85%; animation-delay: 2s;">🔱</div>

    <div class="top-popup">📲 Share on WhatsApp to get good news in 3 days!</div>
    <div class="visitor-counter">Blessings Shared: <span id="count">1,008</span></div>

    <div class="main">
        <h1>Har Har Mahadev</h1>
        
        <div id="captureArea">
            <p id="promptText" style="font-size: 1.2rem; font-weight: 600;">Check how much Mahadev loves you</p>
            <input type="text" id="uName" placeholder="Enter Your Name">
            
            <div id="res" class="result-box">
                <span id="finalName" style="font-size: 1.5rem; font-weight: bold;"></span><br>
                <span class="percentage" id="finalPercent">0%</span>
                <p style="color: #ffd700; font-weight: 600;">Mahadev is always with you! 🙏</p>
            </div>
        </div>

        <button class="btn-main" id="checkBtn" onclick="calculateLove()">Check Love %</button>

        <div class="share-row" id="shareSection" style="display:none;">
            <button class="btn-s dl" onclick="downloadImage()">⬇️ Save Status</button> <br>
            <a href="#" id="waLink" class="btn-s wa">WhatsApp</a>
            <a href="#" id="fbLink" class="btn-s fb">Facebook</a>
        </div>
    </div>

    <div class="bottom-popup">🙏 May Lord Shiva keep your family members healthy</div>

    <audio id="mantraAudio" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        function calculateLove() {
            const name = document.getElementById('uName').value;
            const audio = document.getElementById('mantraAudio');
            
            if (name.trim() === "") {
                alert("Please enter your name!");
                return;
            }

            audio.play().catch(e => alert("Please click again to hear the mantra!"));
            
            const loveNum = Math.floor(Math.random() * (100 - 95 + 1)) + 95;
            
            document.getElementById('promptText').style.display = "none";
            document.getElementById('uName').style.display = "none";
            document.getElementById('checkBtn').style.display = "none";
            
            document.getElementById('finalName').innerText = name;
            document.getElementById('finalPercent').innerText = loveNum + "%";
            document.getElementById('res').style.display = "block";
            document.getElementById('shareSection').style.display = "block";

            const siteUrl = window.location.href;
            const msg = `Mahadev loves ${name} ${loveNum}%! 🙏✨ Check your blessing here: ${siteUrl}`;
            document.getElementById('waLink').href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(msg);
            document.getElementById('fbLink').href = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(siteUrl);
        }

        function downloadImage() {
            const container = document.getElementById("captureArea");
            html2canvas(container, { backgroundColor: "#1a1a1a", scale: 2 }).then(canvas => {
                const link = document.createElement("a");
                link.download = "Mahadev_Love.png";
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
