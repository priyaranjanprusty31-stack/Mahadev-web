<style>
    /* ... (baaki CSS same rahega) ... */
    
    .fb { background: #1877F2; font-size: 1.1rem; } /* Facebook Blue */
    
    .btn-s { 
        text-decoration: none; 
        color: white; 
        padding: 15px 40px; 
        border-radius: 50px; 
        margin: 8px 0; 
        font-weight: bold; 
        width: 280px; /* Width thodi badhayi taaki text sahi dikhe */
        display: inline-block;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: 0.3s;
    }
</style>

<div class="share-row" id="shareSection" style="display:none;">
    <a href="#" id="waLink" class="btn-s wa">🚩 WhatsApp Share</a>
    <a href="#" id="fbLink" class="btn-s fb" target="_blank">🔵 Facebook Share</a>
    <button class="btn-s dl" onclick="downloadImage()">⬇️ Save Status Image</button>
</div>

<script>
    function calculateLove() {
        const name = document.getElementById('uName').value;
        if (name.trim() === "") { alert("Please enter your name!"); return; }

        document.getElementById('mantraAudio').play().catch(() => {});
        
        const loveNum = Math.floor(Math.random() * 6) + 95;
        
        document.getElementById('promptText').style.display = "none";
        document.getElementById('uName').style.display = "none";
        document.getElementById('checkBtn').style.display = "none";
        
        document.getElementById('finalName').innerText = name;
        document.getElementById('finalPercent').innerText = loveNum + "%";
        document.getElementById('res').style.display = "block";
        document.getElementById('shareSection').style.display = "flex";

        const siteUrl = window.location.href;
        
        // WhatsApp Message
        const msg = `🔱 *Mahadev Blessings* 🔱\n\nJai Bholenath! *${name}* ne check kiya ki Mahadev unhe *${loveNum}%* pyaar karte hain! 🙏✨\n\nAap bhi check karein:\n👉 ${siteUrl}`;
        document.getElementById('waLink').href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(msg);
        
        // Facebook Share Link
        document.getElementById('fbLink').href = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(siteUrl);
    }

    // ... (downloadImage function same rahega) ...
</script>
